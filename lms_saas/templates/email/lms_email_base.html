<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ subject or company_name }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f8fa;font-family:Inter,Segoe UI,Helvetica,Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f8fa;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#ffffff;border:1px solid #d7e3ea;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:{{ primary_color }};padding:20px 24px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  {% if logo_url %}
                  <td width="48" valign="middle" style="padding-right:12px;">
                    <img src="{{ logo_url }}" alt="{{ company_name }}" width="40" height="40" style="display:block;border-radius:8px;object-fit:contain;">
                  </td>
                  {% endif %}
                  <td valign="middle">
                    <p style="margin:0;font-size:18px;font-weight:700;color:#ffffff;line-height:1.3;">{{ company_name }}</p>
                    {% if tagline %}
                    <p style="margin:4px 0 0;font-size:12px;color:#c8e6ef;line-height:1.4;">{{ tagline }}</p>
                    {% endif %}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;font-size:15px;line-height:1.6;color:#0f172a;">
              {{ body_content | safe }}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px 20px;border-top:1px solid #e2e8f0;background:#f8fafc;font-size:12px;line-height:1.5;color:#64748b;">
              <p style="margin:0 0 8px;">{{ footer_text }}</p>
              {% if support_email %}
              <p style="margin:0 0 8px;">{{ _("Questions?") }} <a href="mailto:{{ support_email }}" style="color:{{ primary_color }};">{{ support_email }}</a></p>
              {% endif %}
              {% if legal_footer %}
              <p style="margin:0;font-size:11px;color:#94a3b8;">{{ legal_footer }}</p>
              {% endif %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
