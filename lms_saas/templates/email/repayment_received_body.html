<p style="margin:0 0 12px;">{{ _("Thank you") }}{% if customer_name %}, <strong>{{ customer_name }}</strong>{% endif %}.</p>
<p style="margin:0 0 12px;">{{ _("We have received your loan repayment.") }}</p>
<p style="margin:0 0 8px;">{{ _("Loan") }}: <strong>{{ loan_name }}</strong></p>
<p style="margin:0 0 12px;">{{ _("Amount") }}: <strong>{{ amount_paid }}</strong></p>
<p style="margin:0 0 16px;">{{ _("This message confirms posting to your loan account.") }}</p>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
  <tr>
    <td align="center" style="padding:8px 0;">
      <a href="{{ site_url | safe }}/lms/loan?name={{ loan_name | urlencode }}" style="display:inline-block;padding:12px 28px;background:{{ primary_color }};color:#ffffff;font-weight:600;font-size:15px;border-radius:8px;text-decoration:none;">{{ _("View loan details") }}</a>
    </td>
  </tr>
</table>
